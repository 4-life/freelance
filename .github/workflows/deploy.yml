name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Hashed JS/CSS bundles are immutable — browsers and CDN can cache them forever.
      - name: Upload hashed assets (immutable cache)
        run: |
          aws s3 sync build/client/assets s3://${{ vars.S3_BUCKET }}/assets \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      # HTML and everything else revalidates on every request.
      - name: Upload remaining files (revalidating cache)
        run: |
          aws s3 sync build/client s3://${{ vars.S3_BUCKET }} \
            --exclude "assets/*" \
            --cache-control "public, max-age=0, must-revalidate" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"